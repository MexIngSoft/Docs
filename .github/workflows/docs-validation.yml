name: Docs Validation

on:
  pull_request:
    paths:
      - "**.md"
      - "scripts/**"
      - ".github/workflows/docs-validation.yml"
  push:
    branches:
      - dev
    paths:
      - "**.md"
      - "scripts/**"
      - ".github/workflows/docs-validation.yml"

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate documentation rules
        run: sh scripts/validate-docs-rules.sh
